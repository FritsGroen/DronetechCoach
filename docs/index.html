<!DOCTYPE html> <html lang="nl"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <title>DroneTech Coach</title> <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" /> <style> :root { --bg1: #0b1020; --bg2: #131a33; --glass: rgba(255, 255, 255, 0.08); --glass-strong: rgba(255, 255, 255, 0.14); --border: rgba(255, 255, 255, 0.12); --text: #f3f6ff; --muted: #b9c2e3; --user: #2f6fed; --assistant: rgba(255, 255, 255, 0.08); --input: rgba(255, 255, 255, 0.08); --shadow: 0 20px 60px rgba(0, 0, 0, 0.35); --success: #51d88a; --warning: #ffb347; --error: #ff6b6b; } * { box-sizing: border-box; } html, body { margin: 0; height: 100%; font-family: Inter, Segoe UI, Arial, sans-serif; color: var(--text); background: radial-gradient(circle at 15% 20%, rgba(86, 125, 255, 0.35), transparent 30%), radial-gradient(circle at 85% 25%, rgba(0, 200, 255, 0.22), transparent 30%), radial-gradient(circle at 70% 75%, rgba(135, 85, 255, 0.20), transparent 28%), linear-gradient(135deg, var(--bg1), var(--bg2)); overflow: hidden; } body::before, body::after { content: ""; position: fixed; inset: auto; width: 520px; height: 520px; border-radius: 50%; filter: blur(90px); z-index: 0; opacity: 0.45; animation: floatBlob 20s ease-in-out infinite alternate; pointer-events: none; } body::before { top: -120px; left: -100px; background: rgba(43, 115, 255, 0.28); } body::after { bottom: -140px; right: -120px; background: rgba(120, 65, 255, 0.24); animation-delay: 4s; } @keyframes floatBlob { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, -30px) scale(1.12); } } .grid-overlay { position: fixed; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 32px 32px; mask-image: radial-gradient(circle at center, black 45%, transparent 100%); pointer-events: none; z-index: 0; } .app-shell { position: relative; z-index: 1; height: 100%; display: flex; align-items: center; justify-content: center; padding: 20px; } .chat-card { width: min(100%, 1000px); height: min(92vh, 900px); display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 28px; background: linear-gradient( 180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05) ); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: var(--shadow); overflow: hidden; } .topbar { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 18px 22px; border-bottom: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); } .brand { display: flex; align-items: center; gap: 14px; min-width: 0; } .logo { width: 42px; height: 42px; border-radius: 14px; display: grid; place-items: center; background: linear-gradient(135deg, #3a7bff, #6d4dff); font-weight: 700; box-shadow: 0 10px 30px rgba(58, 123, 255, 0.35); flex-shrink: 0; } .brand-text h1 { margin: 0; font-size: 18px; line-height: 1.1; } .brand-text p { margin: 4px 0 0; color: var(--muted); font-size: 13px; } .topbar-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; } .new-chat-btn { border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.08); color: var(--text); border-radius: 14px; padding: 10px 14px; font-size: 13px; cursor: pointer; transition: 0.2s ease; white-space: nowrap; } .new-chat-btn:hover { background: rgba(255,255,255,0.14); transform: translateY(-1px); } .status { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 13px; white-space: nowrap; } .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--warning); box-shadow: 0 0 12px rgba(255, 179, 71, 0.9); transition: background 0.2s ease, box-shadow 0.2s ease; } .status-dot.ok { background: var(--success); box-shadow: 0 0 12px rgba(81, 216, 138, 0.9); } .status-dot.error { background: var(--error); box-shadow: 0 0 12px rgba(255, 107, 107, 0.9); } .chat-area { flex: 1; overflow-y: auto; padding: 22px; scroll-behavior: smooth; } .messages { display: flex; flex-direction: column; gap: 16px; } .message-row { display: flex; width: 100%; } .message-row.user { justify-content: flex-end; } .message-row.assistant { justify-content: flex-start; } .bubble { max-width: min(78%, 760px); padding: 14px 16px; border-radius: 20px; line-height: 1.5; font-size: 15px; word-wrap: break-word; border: 1px solid rgba(255,255,255,0.08); overflow-wrap: anywhere; } .message-row.user .bubble { background: linear-gradient(135deg, #2f6fed, #5d84ff); color: white; border-bottom-right-radius: 8px; box-shadow: 0 10px 24px rgba(47,111,237,0.25); } .message-row.assistant .bubble { background: var(--assistant); color: var(--text); border-bottom-left-radius: 8px; } .meta { margin-top: 10px; font-size: 11px; color: rgba(255,255,255,0.55); display: flex; flex-wrap: wrap; gap: 10px; align-items: center; } .source-box { margin-top: 12px; padding: 10px 12px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); } .source-title { margin: 0 0 8px; font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase; } .source-list { margin: 0; padding-left: 18px; font-size: 13px; color: var(--text); } .source-list li + li { margin-top: 4px; } .bubble-content > *:first-child { margin-top: 0; } .bubble-content > *:last-child { margin-bottom: 0; } .bubble-content h1, .bubble-content h2, .bubble-content h3, .bubble-content h4 { margin: 0 0 10px; line-height: 1.25; } .bubble-content h1 { font-size: 1.45em; } .bubble-content h2 { font-size: 1.28em; } .bubble-content h3 { font-size: 1.14em; } .bubble-content h4 { font-size: 1.02em; } .bubble-content p { margin: 0 0 10px; } .bubble-content ul, .bubble-content ol { margin: 0 0 10px 20px; padding: 0; } .bubble-content li { margin: 4px 0; } .bubble-content hr { border: 0; border-top: 1px solid rgba(255,255,255,0.12); margin: 14px 0; } .bubble-content blockquote { margin: 10px 0; padding: 10px 14px; border-left: 3px solid rgba(255,255,255,0.24); background: rgba(255,255,255,0.05); border-radius: 10px; } .bubble-content a { color: #b7ccff; } .bubble-content code { background: rgba(255,255,255,0.10); padding: 2px 6px; border-radius: 6px; font-family: Consolas, Monaco, monospace; font-size: 0.95em; } .bubble-content pre { background: rgba(0,0,0,0.22); padding: 12px; border-radius: 12px; overflow-x: auto; margin: 10px 0; } .bubble-content pre code { background: transparent; padding: 0; font-size: 0.95em; } .bubble-content strong { font-weight: 700; } .bubble-content table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 14px; overflow: hidden; border-radius: 10px; } .bubble-content th, .bubble-content td { border: 1px solid rgba(255,255,255,0.12); padding: 8px 10px; text-align: left; vertical-align: top; } .bubble-content th { background: rgba(255,255,255,0.08); } .bubble-content .katex-display { overflow-x: auto; overflow-y: hidden; padding: 4px 0; } .typing { display: inline-flex; align-items: center; gap: 6px; padding: 12px 14px; border-radius: 18px; background: var(--assistant); border: 1px solid rgba(255,255,255,0.08); width: fit-content; } .typing span { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.8); display: inline-block; animation: blink 1.2s infinite ease-in-out; } .typing span:nth-child(2) { animation-delay: 0.15s; } .typing span:nth-child(3) { animation-delay: 0.3s; } @keyframes blink { 0%, 80%, 100% { transform: scale(0.7); opacity: 0.45; } 40% { transform: scale(1); opacity: 1; } } .quick-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 6px; } .quick-btn { border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); color: var(--text); border-radius: 999px; padding: 10px 14px; cursor: pointer; font-size: 13px; transition: 0.2s ease; } .quick-btn:hover { transform: translateY(-1px); background: rgba(255,255,255,0.10); } .input-wrap { padding: 16px; border-top: 1px solid rgba(255,255,255,0.08); background: rgba(10,14,30,0.45); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); } .composer { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: end; } .composer-box { background: var(--input); border: 1px solid rgba(255,255,255,0.10); border-radius: 20px; padding: 12px 14px; } textarea { width: 100%; resize: none; border: none; outline: none; background: transparent; color: var(--text); font: inherit; font-size: 15px; line-height: 1.45; min-height: 28px; max-height: 180px; } textarea::placeholder { color: rgba(255,255,255,0.5); } .composer-footer { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 8px; } .hint { font-size: 12px; color: var(--muted); } .send-btn { border: none; border-radius: 18px; padding: 14px 18px; font-size: 14px; font-weight: 600; cursor: pointer; color: white; background: linear-gradient(135deg, #2f6fed, #6d4dff); box-shadow: 0 10px 24px rgba(47,111,237,0.30); transition: transform 0.15s ease, opacity 0.15s ease; } .send-btn:hover { transform: translateY(-1px); } .send-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; } @media (max-width: 700px) { .chat-card { height: 100vh; width: 100%; border-radius: 0; } .topbar { padding: 14px 16px; align-items: flex-start; } .topbar-right { flex-direction: column; align-items: flex-end; } .chat-area { padding: 16px; } .bubble { max-width: 88%; } .status { display: none; } .composer { grid-template-columns: 1fr; } .send-btn { width: 100%; } } </style> </head> <body> <div class="grid-overlay"></div> <div class="app-shell"> <div class="chat-card"> <div class="topbar"> <div class="brand"> <div class="logo">DT</div> <div class="brand-text"> <h1>DroneTech Coach</h1> <p>Jouw assistent voor drone-techniek, checklists en projectwerk</p> </div> </div> <div class="topbar-right"> <button id="new-chat-btn" class="new-chat-btn" type="button">Nieuwe chat</button> <div class="status"> <span class="status-dot" id="status-dot"></span> <span id="status-text">Backend controleren...</span> </div> </div> </div> <div class="chat-area" id="chat-area"> <div class="messages" id="messages"></div> </div> <div class="input-wrap"> <form id="chat-form" class="composer"> <div class="composer-box"> <textarea id="user-input" placeholder="Typ je bericht hier..." rows="1" ></textarea> <div class="composer-footer"> <div class="hint">Enter = verzenden · Shift+Enter = nieuwe regel</div> </div> </div> <button type="submit" class="send-btn" id="send-btn">Verstuur</button> </form> </div> </div> </div> <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script> <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script> <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script> <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script> <script> /* BELANGRIJK: 1. Lokaal testen op de mini-pc: laat PUBLIC_API_BASE leeg en open deze pagina lokaal vanaf dezelfde machine. 2. Voor GitHub Pages + thuisgebruik door studenten: vul straks hier jouw publieke HTTPS backend-adres in, bijvoorbeeld: const PUBLIC_API_BASE = "https://jouw-backend.ngrok-free.app"; 3. Studenten kunnen dit niet aanpassen in de gepubliceerde site, tenzij jij zelf de code in GitHub wijzigt. */ const PUBLIC_API_BASE = ""; const LOCAL_API_BASE = "http://localhost:3000"; const GITHUB_PAGES_HOST = "fritsgroen.github.io"; function getApiBase() { const host = window.location.hostname; if (host === "localhost" || host === "127.0.0.1") { return LOCAL_API_BASE; } if (host === GITHUB_PAGES_HOST) { return PUBLIC_API_BASE || ""; } return PUBLIC_API_BASE || LOCAL_API_BASE; } const API_BASE = getApiBase(); const BACKEND_URL = API_BASE ? `${API_BASE}/chat` : ""; const HEALTH_URL = API_BASE ? `${API_BASE}/health` : ""; const messagesEl = document.getElementById("messages"); const chatArea = document.getElementById("chat-area"); const form = document.getElementById("chat-form"); const input = document.getElementById("user-input"); const sendBtn = document.getElementById("send-btn"); const statusText = document.getElementById("status-text"); const statusDot = document.getElementById("status-dot"); const newChatBtn = document.getElementById("new-chat-btn"); const STORAGE_KEY = "dronetech_chat_history_v4"; let conversation = []; let isWaiting = false; if (window.marked) { marked.setOptions({ breaks: true, gfm: true }); } function nowTime() { return new Date().toLocaleTimeString("nl-NL", { hour: "2-digit", minute: "2-digit" }); } function saveConversation() { localStorage.setItem(STORAGE_KEY, JSON.stringify(conversation)); } function loadConversation() { const raw = localStorage.getItem(STORAGE_KEY); if (!raw) return null; try { return JSON.parse(raw); } catch { return null; } } function autoResizeTextarea() { input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 180) + "px"; } function scrollToBottom() { chatArea.scrollTop = chatArea.scrollHeight; } function escapeHtml(text) { return (text || "") .replace(/&/g, "&amp;") .replace(/</g, "&lt;") .replace(/>/g, "&gt;"); } function renderUserText(text) { return escapeHtml(text).replace(/\n/g, "<br>"); } function renderAssistantMarkdown(text) { try { const rawHtml = window.marked ? marked.parse(text || "") : renderUserText(text); return window.DOMPurify ? DOMPurify.sanitize(rawHtml) : rawHtml; } catch { return renderUserText(text); } } function renderMath(container) { if (!window.renderMathInElement || !container) return; renderMathInElement(container, { delimiters: [ { left: "$$", right: "$$", display: true }, { left: "$", right: "$", display: false }, { left: "\\(", right: "\\)", display: false }, { left: "\\[", right: "\\]", display: true } ], throwOnError: false, ignoredTags: ["script", "noscript", "style", "textarea", "pre", "code"] }); } function setStatus(mode, text) { statusDot.classList.remove("ok", "error"); if (mode === "ok") { statusDot.classList.add("ok"); } else if (mode === "error") { statusDot.classList.add("error"); } statusText.textContent = text; } function createBubble(role, text, metaText = "", sources = []) { const row = document.createElement("div"); row.className = `message-row ${role}`; const bubble = document.createElement("div"); bubble.className = "bubble"; const content = document.createElement("div"); content.className = "bubble-content"; if (role === "assistant") { content.innerHTML = renderAssistantMarkdown(text); } else { content.innerHTML = renderUserText(text); } bubble.appendChild(content); if (Array.isArray(sources) && sources.length > 0) { const sourceBox = document.createElement("div"); sourceBox.className = "source-box"; const sourceTitle = document.createElement("div"); sourceTitle.className = "source-title"; sourceTitle.textContent = "Gebruikte bronnen"; const sourceList = document.createElement("ul"); sourceList.className = "source-list"; sources.forEach((source) => { const li = document.createElement("li"); li.textContent = typeof source === "string" ? source : source.file || source.filename || source.name || JSON.stringify(source); sourceList.appendChild(li); }); sourceBox.appendChild(sourceTitle); sourceBox.appendChild(sourceList); bubble.appendChild(sourceBox); } if (metaText) { const meta = document.createElement("div"); meta.className = "meta"; meta.textContent = metaText; bubble.appendChild(meta); } row.appendChild(bubble); messagesEl.appendChild(row); if (role === "assistant") { renderMath(content); } scrollToBottom(); } function showTyping() { const row = document.createElement("div"); row.className = "message-row assistant"; row.id = "typing-row"; const typing = document.createElement("div"); typing.className = "typing"; typing.innerHTML = "<span></span><span></span><span></span>"; row.appendChild(typing); messagesEl.appendChild(row); scrollToBottom(); } function hideTyping() { const typingRow = document.getElementById("typing-row"); if (typingRow) typingRow.remove(); } function addQuickActions() { const row = document.createElement("div"); row.className = "message-row assistant"; const wrapper = document.createElement("div"); wrapper.style.display = "flex"; wrapper.style.flexDirection = "column"; wrapper.style.gap = "10px"; const bubble = document.createElement("div"); bubble.className = "bubble"; const content = document.createElement("div"); content.className = "bubble-content"; content.innerHTML = "<p><strong>Waarmee wil je beginnen?</strong></p>"; bubble.appendChild(content); const quick = document.createElement("div"); quick.className = "quick-actions"; const options = [ "Geef een checklist voor pre-flight", "Wat is een goede PvE-opzet?", "Leg ESC uit in simpele taal", "Help met een user story" ]; options.forEach((label) => { const btn = document.createElement("button"); btn.type = "button"; btn.className = "quick-btn"; btn.textContent = label; btn.addEventListener("click", () => { input.value = label; autoResizeTextarea(); input.focus(); }); quick.appendChild(btn); }); wrapper.appendChild(bubble); wrapper.appendChild(quick); row.appendChild(wrapper); messagesEl.appendChild(row); } function renderConversation() { messagesEl.innerHTML = ""; if (!conversation.length) { let welcomeText = [ "# Welkom", "", "Ik ben **DroneTech Coach**.", "", "Stel je vraag over drone-techniek, onderhoud, checklists, PvE’s, logboeken, projectopdrachten of formules zoals $P = U \\\\cdot I$." ].join("\n"); if (!API_BASE) { welcomeText += "\n\n> Let op: de backend is nog niet gekoppeld aan een publieke URL. Lokaal testen werkt, maar thuisgebruik nog niet."; } createBubble("assistant", welcomeText, nowTime()); addQuickActions(); return; } for (const msg of conversation) { createBubble(msg.role, msg.content, msg.time || "", msg.sources || []); } } async function checkHealth() { if (!API_BASE) { setStatus("error", "Geen publieke backend ingesteld"); return; } try { const response = await fetch(HEALTH_URL, { method: "GET" }); if (!response.ok) { throw new Error(`HTTP ${response.status}`); } const data = await response.json(); const fileCount = typeof data.files === "number" ? ` · ${data.files} bestanden` : ""; const chunkCount = typeof data.chunks === "number" ? ` · ${data.chunks} chunks` : ""; setStatus("ok", `Backend online${fileCount}${chunkCount}`); } catch (error) { setStatus("error", "Backend niet bereikbaar"); console.error("Health check failed:", error); } } function buildFriendlyError(error) { if (!API_BASE) { return [ "**Backend nog niet gekoppeld.**", "", "Deze frontend draait al wel, maar de publieke backend-url is nog niet ingevuld.", "", "Vul bovenin het script later een vaste HTTPS-url in bij `PUBLIC_API_BASE`." ].join("\n"); } return [ `**Backend fout:** ${error.message}`, "", "Mogelijke oorzaken:", "", "- de backend draait niet", "- CORS staat nog niet goed", "- de publieke backend-url klopt nog niet", "- de backend is via HTTP bereikbaar in plaats van HTTPS" ].join("\n"); } async function sendMessage(text) { if (!text.trim() || isWaiting) return; if (!BACKEND_URL) { const assistantMsg = { role: "assistant", content: buildFriendlyError(new Error("Geen backend-url ingesteld.")), time: nowTime() }; conversation.push({ ...assistantMsg, sources: [] }); saveConversation(); createBubble("assistant", assistantMsg.content, assistantMsg.time, []); return; } isWaiting = true; sendBtn.disabled = true; setStatus("", "Bezig met antwoorden..."); const userMsg = { role: "user", content: text.trim(), time: nowTime(), sources: [] }; conversation.push(userMsg); saveConversation(); createBubble("user", userMsg.content, userMsg.time); input.value = ""; autoResizeTextarea(); showTyping(); try { const payload = { messages: conversation.map(({ role, content }) => ({ role, content })) }; const response = await fetch(BACKEND_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) }); const raw = await response.text(); let data; try { data = JSON.parse(raw); } catch { throw new Error("Server gaf geen geldige JSON terug."); } if (!response.ok) { throw new Error(data.error || `HTTP fout ${response.status}`); } const reply = data.reply || data.answer || data.message || data.output || "Ik kreeg geen bruikbaar antwoord terug van de server."; const sources = data.sources || data.usedChunks || data.contextFiles || []; hideTyping(); const assistantMsg = { role: "assistant", content: reply, time: nowTime(), sources }; conversation.push(assistantMsg); saveConversation(); createBubble("assistant", assistantMsg.content, assistantMsg.time, assistantMsg.sources); await checkHealth(); } catch (error) { hideTyping(); const assistantMsg = { role: "assistant", content: buildFriendlyError(error), time: nowTime(), sources: [] }; conversation.push(assistantMsg); saveConversation(); createBubble("assistant", assistantMsg.content, assistantMsg.time, []); setStatus("error", "Backend fout"); console.error("Backend error:", error); } finally { isWaiting = false; sendBtn.disabled = false; input.focus(); scrollToBottom(); } } form.addEventListener("submit", async (e) => { e.preventDefault(); await sendMessage(input.value); }); input.addEventListener("input", autoResizeTextarea); input.addEventListener("keydown", async (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); await sendMessage(input.value); } }); newChatBtn.addEventListener("click", () => { const confirmed = window.confirm("Weet je zeker dat je een nieuwe chat wilt starten? De huidige chatgeschiedenis wordt dan gewist."); if (!confirmed) return; localStorage.removeItem(STORAGE_KEY); conversation = []; renderConversation(); input.value = ""; autoResizeTextarea(); checkHealth(); input.focus(); }); window.addEventListener("load", async () => { const saved = loadConversation(); if (saved && Array.isArray(saved)) { conversation = saved; } renderConversation(); autoResizeTextarea(); input.focus(); await checkHealth(); }); window.resetDroneTechChat = function () { localStorage.removeItem(STORAGE_KEY); conversation = []; renderConversation(); checkHealth(); }; </script> </body> </html>
