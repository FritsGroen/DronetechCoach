<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DroneTech Coach</title>

  <!-- Externe styles/scripts -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
  />

  <style>
    /* =========================================================
       1. DESIGN TOKENS
       ========================================================= */
    :root {
      --bg: #0a101b;
      --bg-soft: #0f1728;
      --panel: rgba(15, 23, 42, 0.9);
      --panel-top: rgba(20, 30, 48, 0.95);
      --panel-light: rgba(255, 255, 255, 0.04);

      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.14);

      --text: #e7edf7;
      --muted: #9aa7bd;
      --muted-soft: #7f8aa0;

      --primary: #2563eb;
      --primary-strong: #1d4ed8;

      --success: #34d399;
      --warning: #f59e0b;
      --error: #ef4444;

      --assistant-bubble: rgba(255, 255, 255, 0.045);
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.32);

      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;

      --max-card-width: 1180px;
      --max-content-width: 920px;
    }

    /* =========================================================
       2. RESET / BASE
       ========================================================= */
    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.08), transparent 24%),
        linear-gradient(180deg, #0a101b 0%, #0b1220 100%);
      overflow: hidden;
      overscroll-behavior: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    button,
    textarea {
      font: inherit;
    }

    /* =========================================================
       3. LAYOUT
       ========================================================= */
    .grid-overlay {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 36px 36px;
      opacity: 0.45;
      pointer-events: none;
    }

    .app-shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 26px;
    }

    .chat-card {
      width: min(var(--max-card-width), 100%);
      height: min(92vh, 940px);
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(
          180deg,
          rgba(17, 26, 43, 0.95),
          rgba(11, 18, 32, 0.94)
        );
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .main-area {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    /* =========================================================
       4. TOPBAR
       ========================================================= */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      background: var(--panel-top);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: linear-gradient(180deg, var(--primary), var(--primary-strong));
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.22);
      position: relative;
    }

    .brand-mark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #ffffff;
    }

    .brand-fallback {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .brand-text {
      min-width: 0;
    }

    .brand-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .toolbar-btn {
      appearance: none;
      border: 1px solid var(--border-strong);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .toolbar-btn:hover {
      background: rgba(255, 255, 255, 0.07);
      transform: translateY(-1px);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--warning);
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.12);
      transition: 0.2s ease;
      flex-shrink: 0;
    }

    .status-dot.ok {
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(52, 211, 153, 0.12);
    }

    .status-dot.error {
      background: var(--error);
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.12);
    }

    /* =========================================================
       5. CHAT AREA
       ========================================================= */
    .chat-area {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 28px 28px 22px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .messages {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: min(var(--max-content-width), 100%);
      margin: 0 auto;
    }

    .message-row {
      display: flex;
      width: 100%;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.assistant {
      justify-content: flex-start;
    }

    .bubble {
      max-width: min(78%, 760px);
      padding: 16px 18px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      line-height: 1.6;
      font-size: 15px;
      word-wrap: break-word;
      overflow-wrap: anywhere;
    }

    .message-row.user .bubble {
      background: linear-gradient(180deg, #3b82f6, #2563eb);
      color: #ffffff;
      border-bottom-right-radius: 8px;
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.18);
    }

    .message-row.assistant .bubble {
      background: var(--assistant-bubble);
      color: var(--text);
      border-bottom-left-radius: 8px;
    }

    .meta {
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted-soft);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    /* =========================================================
       6. RICH CONTENT
       ========================================================= */
    .bubble-content > *:first-child {
      margin-top: 0;
    }

    .bubble-content > *:last-child {
      margin-bottom: 0;
    }

    .bubble-content h1,
    .bubble-content h2,
    .bubble-content h3,
    .bubble-content h4 {
      margin: 0 0 10px;
      line-height: 1.25;
      letter-spacing: -0.02em;
    }

    .bubble-content h1 { font-size: 1.45em; }
    .bubble-content h2 { font-size: 1.28em; }
    .bubble-content h3 { font-size: 1.15em; }
    .bubble-content h4 { font-size: 1.02em; }

    .bubble-content p {
      margin: 0 0 10px;
    }

    .bubble-content ul,
    .bubble-content ol {
      margin: 0 0 10px 20px;
      padding: 0;
    }

    .bubble-content li {
      margin: 4px 0;
    }

    .bubble-content blockquote {
      margin: 12px 0;
      padding: 12px 14px;
      border-left: 3px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.04);
      border-radius: 10px;
    }

    .bubble-content hr {
      border: 0;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin: 14px 0;
    }

    .bubble-content a {
      color: #93c5fd;
    }

    .bubble-content code {
      background: rgba(255, 255, 255, 0.08);
      padding: 2px 6px;
      border-radius: 6px;
      font-family: Consolas, Monaco, monospace;
      font-size: 0.94em;
    }

    .bubble-content pre {
      background: rgba(0, 0, 0, 0.24);
      padding: 12px;
      border-radius: 12px;
      overflow-x: auto;
      margin: 12px 0;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .bubble-content pre code {
      background: transparent;
      padding: 0;
    }

    .bubble-content table {
      border-collapse: collapse;
      width: 100%;
      margin: 10px 0;
      font-size: 14px;
      border-radius: 10px;
      overflow: hidden;
    }

    .bubble-content th,
    .bubble-content td {
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }

    .bubble-content th {
      background: rgba(255, 255, 255, 0.05);
    }

    .bubble-content .katex-display {
      overflow-x: auto;
      overflow-y: hidden;
      padding: 4px 0;
    }

    /* =========================================================
       7. SOURCES / QUICK ACTIONS / TYPING
       ========================================================= */
    .source-box {
      margin-top: 12px;
      padding: 12px 13px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    .source-title {
      margin: 0 0 8px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .source-list {
      margin: 0;
      padding-left: 18px;
      font-size: 13px;
      color: var(--text);
    }

    .source-list li + li {
      margin-top: 4px;
    }

    .typing {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 14px;
      border-radius: 16px;
      background: var(--assistant-bubble);
      border: 1px solid var(--border);
      width: fit-content;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.82);
      display: inline-block;
      animation: blink 1.2s infinite ease-in-out;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes blink {
      0%, 80%, 100% {
        transform: scale(0.7);
        opacity: 0.45;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 6px;
    }

    .quick-btn {
      appearance: none;
      border: 1px solid var(--border-strong);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
      transition: 0.15s ease;
    }

    .quick-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.07);
    }

    /* =========================================================
       8. INPUT / COMPOSER
       ========================================================= */
    .input-wrap {
      border-top: 1px solid var(--border);
      background: rgba(7, 12, 22, 0.88);
      padding: 18px 22px calc(18px + env(safe-area-inset-bottom));
    }

    .composer {
      width: min(var(--max-content-width), 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
    }

    .composer-box {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px 14px;
    }

    textarea {
      width: 100%;
      resize: none;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      min-height: 34px;
      max-height: 180px;
    }

    textarea::placeholder {
      color: var(--muted-soft);
    }

    .composer-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }

    .hint {
      font-size: 12px;
      color: var(--muted-soft);
    }

    .send-btn {
      appearance: none;
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      min-width: 116px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: #ffffff;
      background: linear-gradient(180deg, #3b82f6, #2563eb);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.2);
      transition: 0.15s ease;
    }

    .send-btn:hover {
      transform: translateY(-1px);
    }

    .send-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    /* =========================================================
       9. RESPONSIVE
       ========================================================= */
    @media (max-width: 900px) {
      .app-shell {
        padding: 14px;
      }

      .chat-card {
        width: 100%;
        height: min(96vh, 960px);
      }

      .chat-area {
        padding: 20px 18px 16px;
      }

      .messages,
      .composer {
        width: 100%;
      }

      .bubble {
        max-width: 86%;
      }
    }

    @media (max-width: 700px) {
      html,
      body {
        height: 100dvh;
      }

      .app-shell {
        padding: 0;
      }

      .chat-card {
        width: 100%;
        height: 100dvh;
        border-radius: 0;
        border-left: none;
        border-right: none;
      }

      .topbar {
        padding: 14px 14px;
        align-items: flex-start;
      }

      .brand {
        gap: 10px;
      }

      .brand-mark {
        width: 40px;
        height: 40px;
      }

      .brand-title {
        font-size: 18px;
      }

      .brand-subtitle {
        display: none;
      }

      .topbar-right {
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
      }

      .toolbar-btn {
        padding: 9px 12px;
        font-size: 12px;
      }

      .status {
        font-size: 12px;
        padding: 7px 10px;
      }

      .chat-area {
        padding: 14px 12px 12px;
      }

      .messages {
        gap: 12px;
      }

      .bubble {
        max-width: 94%;
        font-size: 16px;
        padding: 14px 15px;
      }

      .meta {
        font-size: 11px;
      }

      .input-wrap {
        padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
      }

      .composer {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .composer-box {
        padding: 10px 12px;
      }

      textarea {
        font-size: 16px;
        max-height: 140px;
      }

      .hint {
        font-size: 11px;
      }

      .send-btn {
        width: 100%;
        min-height: 48px;
      }
    }
  </style>
</head>
<body>
  <!-- Achtergrond -->
  <div class="grid-overlay"></div>

  <!-- App -->
  <div class="app-shell">
    <div class="chat-card">
      <!-- Header -->
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <img
              src="./assets/logo-lis.png"
              alt=""
              onerror="this.style.display='none'; this.nextElementSibling.style.display='grid';"
            />
            <span class="brand-fallback">DT</span>
          </div>

          <div class="brand-text">
            <h1 class="brand-title">DroneTech Coach</h1>
            <p class="brand-subtitle">
              Jouw assistent voor drone-techniek, checklists en projectwerk
            </p>
          </div>
        </div>

        <div class="topbar-right">
          <button id="new-chat-btn" class="toolbar-btn" type="button">
            Nieuwe chat
          </button>

          <div class="status" aria-live="polite">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Backend controleren...</span>
          </div>
        </div>
      </header>

      <!-- Main -->
      <div class="main-area">
        <main class="chat-area" id="chat-area">
          <div class="messages" id="messages"></div>
        </main>

        <!-- Composer -->
        <div class="input-wrap">
          <form id="chat-form" class="composer">
            <div class="composer-box">
              <textarea
                id="user-input"
                placeholder="Typ je bericht hier..."
                rows="1"
              ></textarea>

              <div class="composer-footer">
                <div class="hint">Enter = verzenden · Shift+Enter = nieuwe regel</div>
              </div>
            </div>

            <button type="submit" class="send-btn" id="send-btn">
              Verstuur
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>

  <script>
    /* =========================================================
       1. CONFIG
       ========================================================= */
    const PUBLIC_API_BASE = "https://christiane-turfy-guiltily.ngrok-free.dev";
    const LOCAL_API_BASE = "http://localhost:3000";
    const GITHUB_PAGES_HOST = "fritsgroen.github.io";
    const STORAGE_KEY = "dronetech_chat_history_v7";

    /* =========================================================
       2. STATE
       ========================================================= */
    let conversation = [];
    let isWaiting = false;

    /* =========================================================
       3. DOM REFERENCES
       ========================================================= */
    const messagesEl = document.getElementById("messages");
    const chatArea = document.getElementById("chat-area");
    const form = document.getElementById("chat-form");
    const input = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    const statusText = document.getElementById("status-text");
    const statusDot = document.getElementById("status-dot");
    const newChatBtn = document.getElementById("new-chat-btn");

    /* =========================================================
       4. API SETUP
       ========================================================= */
    function getApiBase() {
      const protocol = window.location.protocol;
      const host = window.location.hostname;

      if (protocol === "file:") return LOCAL_API_BASE;
      if (host === "localhost" || host === "127.0.0.1") return LOCAL_API_BASE;
      if (host === GITHUB_PAGES_HOST) return PUBLIC_API_BASE;

      return PUBLIC_API_BASE || LOCAL_API_BASE;
    }

    const API_BASE = getApiBase();
    const BACKEND_URL = `${API_BASE}/chat`;
    const HEALTH_URL = `${API_BASE}/health`;

    const EXTRA_API_HEADERS = API_BASE.includes("ngrok-free")
      ? { "ngrok-skip-browser-warning": "true" }
      : {};

    /* =========================================================
       5. MARKDOWN / MATH
       ========================================================= */
    if (window.marked) {
      marked.setOptions({
        breaks: true,
        gfm: true
      });
    }

    function renderAssistantMarkdown(text) {
      try {
        const rawHtml = window.marked
          ? marked.parse(text || "")
          : renderUserText(text);

        return window.DOMPurify ? DOMPurify.sanitize(rawHtml) : rawHtml;
      } catch {
        return renderUserText(text);
      }
    }

    function renderMath(container) {
      if (!window.renderMathInElement || !container) return;

      renderMathInElement(container, {
        delimiters: [
          { left: "$$", right: "$$", display: true },
          { left: "$", right: "$", display: false },
          { left: "\\(", right: "\\)", display: false },
          { left: "\\[", right: "\\]", display: true }
        ],
        throwOnError: false,
        ignoredTags: ["script", "noscript", "style", "textarea", "pre", "code"]
      });
    }

    /* =========================================================
       6. HELPERS
       ========================================================= */
    function nowTime() {
      return new Date().toLocaleTimeString("nl-NL", {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function saveConversation() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(conversation));
    }

    function loadConversation() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;

      try {
        return JSON.parse(raw);
      } catch {
        return null;
      }
    }

    function autoResizeTextarea() {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 180) + "px";
    }

    function scrollToBottom() {
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function mobileScrollFix() {
      setTimeout(scrollToBottom, 250);
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function renderUserText(text) {
      return escapeHtml(text).replace(/\n/g, "<br>");
    }

    function setStatus(mode, text) {
      statusDot.classList.remove("ok", "error");

      if (mode === "ok") {
        statusDot.classList.add("ok");
      } else if (mode === "error") {
        statusDot.classList.add("error");
      }

      statusText.textContent = text;
    }

    function buildFriendlyError(error) {
      return [
        `**Backend fout:** ${error.message}`,
        "",
        "Controleer:",
        "",
        "- draait `server.js` nog?",
        "- staat ngrok nog open?",
        "- is CORS goed ingesteld?",
        "- is de GitHub Pages-versie al bijgewerkt?"
      ].join("\n");
    }

    /* =========================================================
       7. UI RENDERING
       ========================================================= */
    function createBubble(role, text, metaText = "", sources = []) {
      const row = document.createElement("div");
      row.className = `message-row ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      const content = document.createElement("div");
      content.className = "bubble-content";

      if (role === "assistant") {
        content.innerHTML = renderAssistantMarkdown(text);
      } else {
        content.innerHTML = renderUserText(text);
      }

      bubble.appendChild(content);

      if (Array.isArray(sources) && sources.length > 0) {
        const sourceBox = document.createElement("div");
        sourceBox.className = "source-box";

        const sourceTitle = document.createElement("div");
        sourceTitle.className = "source-title";
        sourceTitle.textContent = "Gebruikte bronnen";

        const sourceList = document.createElement("ul");
        sourceList.className = "source-list";

        sources.forEach((source) => {
          const li = document.createElement("li");

          if (typeof source === "string") {
            li.textContent = source;
          } else {
            const label = source.file
              ? `${source.file}${source.chunkIndex !== undefined ? ` · chunk ${source.chunkIndex}` : ""}`
              : JSON.stringify(source);

            li.textContent = label;
          }

          sourceList.appendChild(li);
        });

        sourceBox.appendChild(sourceTitle);
        sourceBox.appendChild(sourceList);
        bubble.appendChild(sourceBox);
      }

      if (metaText) {
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = metaText;
        bubble.appendChild(meta);
      }

      row.appendChild(bubble);
      messagesEl.appendChild(row);

      if (role === "assistant") {
        renderMath(content);
      }

      scrollToBottom();
    }

    function showTyping() {
      const row = document.createElement("div");
      row.className = "message-row assistant";
      row.id = "typing-row";

      const typing = document.createElement("div");
      typing.className = "typing";
      typing.innerHTML = "<span></span><span></span><span></span>";

      row.appendChild(typing);
      messagesEl.appendChild(row);
      scrollToBottom();
    }

    function hideTyping() {
      const typingRow = document.getElementById("typing-row");
      if (typingRow) {
        typingRow.remove();
      }
    }

    function addQuickActions() {
      const row = document.createElement("div");
      row.className = "message-row assistant";

      const wrapper = document.createElement("div");
      wrapper.style.display = "flex";
      wrapper.style.flexDirection = "column";
      wrapper.style.gap = "10px";

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      const content = document.createElement("div");
      content.className = "bubble-content";
      content.innerHTML = "<p><strong>Waarmee wil je beginnen?</strong></p>";
      bubble.appendChild(content);

      const quick = document.createElement("div");
      quick.className = "quick-actions";

      const options = [
        "Geef een checklist voor pre-flight",
        "Wat is een goede PvE-opzet?",
        "Leg ESC uit in simpele taal",
        "Help met een user story"
      ];

      options.forEach((label) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "quick-btn";
        btn.textContent = label;
        btn.addEventListener("click", () => {
          input.value = label;
          autoResizeTextarea();
          input.focus();
        });
        quick.appendChild(btn);
      });

      wrapper.appendChild(bubble);
      wrapper.appendChild(quick);
      row.appendChild(wrapper);
      messagesEl.appendChild(row);
    }

    function renderConversation() {
      messagesEl.innerHTML = "";

      if (!conversation.length) {
        createBubble(
          "assistant",
          [
            "# Welkom",
            "",
            "Ik ben **DroneTech Coach**.",
            "",
            "Stel je vraag over drone-techniek, onderhoud, checklists, PvE’s, logboeken, projectopdrachten of formules zoals $P = U \\\\cdot I$."
          ].join("\n"),
          nowTime()
        );

        addQuickActions();
        return;
      }

      conversation.forEach((msg) => {
        createBubble(msg.role, msg.content, msg.time || "", msg.sources || []);
      });
    }

    /* =========================================================
       8. API CALLS
       ========================================================= */
    async function checkHealth() {
      try {
        const response = await fetch(HEALTH_URL, {
          method: "GET",
          headers: {
            ...EXTRA_API_HEADERS
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        const isMobile = window.innerWidth <= 700;
        const fileCount = typeof data.files === "number" ? ` · ${data.files} bestanden` : "";
        const chunkCount = typeof data.chunks === "number" ? ` · ${data.chunks} chunks` : "";

        setStatus("ok", isMobile ? "Online" : `Backend online${fileCount}${chunkCount}`);
      } catch (error) {
        setStatus("error", "Backend niet bereikbaar");
        console.error("Health check failed:", error);
      }
    }

    async function sendMessage(text) {
      if (!text.trim() || isWaiting) return;

      isWaiting = true;
      sendBtn.disabled = true;
      setStatus("", "Bezig met antwoorden...");

      const userMsg = {
        role: "user",
        content: text.trim(),
        time: nowTime(),
        sources: []
      };

      conversation.push(userMsg);
      saveConversation();
      createBubble("user", userMsg.content, userMsg.time);

      input.value = "";
      autoResizeTextarea();
      showTyping();

      try {
        const payload = {
          messages: conversation.map(({ role, content }) => ({ role, content }))
        };

        const response = await fetch(BACKEND_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            ...EXTRA_API_HEADERS
          },
          body: JSON.stringify(payload)
        });

        const raw = await response.text();

        let data;
        try {
          data = JSON.parse(raw);
        } catch {
          throw new Error("Server gaf geen geldige JSON terug.");
        }

        if (!response.ok) {
          throw new Error(data.error || `HTTP fout ${response.status}`);
        }

        const reply =
          data.reply ||
          data.answer ||
          data.message ||
          data.output ||
          "Ik kreeg geen bruikbaar antwoord terug van de server.";

        const sources = Array.isArray(data.sources) ? data.sources : [];

        hideTyping();

        const assistantMsg = {
          role: "assistant",
          content: reply,
          time: nowTime(),
          sources
        };

        conversation.push(assistantMsg);
        saveConversation();
        createBubble(
          "assistant",
          assistantMsg.content,
          assistantMsg.time,
          assistantMsg.sources
        );

        await checkHealth();
      } catch (error) {
        hideTyping();

        const assistantMsg = {
          role: "assistant",
          content: buildFriendlyError(error),
          time: nowTime(),
          sources: []
        };

        conversation.push(assistantMsg);
        saveConversation();
        createBubble("assistant", assistantMsg.content, assistantMsg.time, []);

        setStatus("error", "Backend fout");
        console.error("Backend error:", error);
      } finally {
        isWaiting = false;
        sendBtn.disabled = false;
        input.focus();
        scrollToBottom();
      }
    }

    /* =========================================================
       9. EVENTS
       ========================================================= */
    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      await sendMessage(input.value);
    });

    input.addEventListener("input", autoResizeTextarea);
    input.addEventListener("focus", mobileScrollFix);
    window.addEventListener("resize", mobileScrollFix);

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", mobileScrollFix);
    }

    input.addEventListener("keydown", async (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        await sendMessage(input.value);
      }
    });

    newChatBtn.addEventListener("click", () => {
      const confirmed = window.confirm(
        "Weet je zeker dat je een nieuwe chat wilt starten? De huidige chatgeschiedenis wordt dan gewist."
      );

      if (!confirmed) return;

      localStorage.removeItem(STORAGE_KEY);
      conversation = [];
      renderConversation();
      input.value = "";
      autoResizeTextarea();
      checkHealth();
      input.focus();
    });

    /* =========================================================
       10. INIT
       ========================================================= */
    window.addEventListener("load", async () => {
      const saved = loadConversation();

      if (saved && Array.isArray(saved)) {
        conversation = saved;
      }

      renderConversation();
      autoResizeTextarea();
      input.focus();
      await checkHealth();
    });

    window.resetDroneTechChat = function () {
      localStorage.removeItem(STORAGE_KEY);
      conversation = [];
      renderConversation();
      checkHealth();
    };
  </script>
<script src="https://res.cdn.office.net/teams-js/2.19.0/js/MicrosoftTeams.min.js" crossorigin="anonymous"></script>

  window.addEventListener("DOMContentLoaded", async () => {
    try {
      if (window.microsoftTeams?.app) {
        await window.microsoftTeams.app.initialize();
        console.log("Teams SDK geïnitialiseerd");
      }
    } catch (err) {
      console.warn("Teams init niet gelukt:", err);
    }
  });
</script>
